<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Student Feedback Portal</h1>

    <form method="POST" class="card">
        <input type="text" name="name" placeholder="Enter your name" required>
        <textarea name="feedback" placeholder="Write your feedback..." required></textarea>
        <button type="submit">Submit Feedback</button>
    </form>

    <div class="card feedback-section">
        <h2>Recent Feedback</h2>

        {% if feedbacks %}
            {% for f in feedbacks %}
                <div class="feedback-item">
                    <p><span class="name">{{ f.name }}</span></p>
                    <p>{{ f.feedback }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p class="empty">No feedback yet. Be the first!</p>
        {% endif %}
    </div>

</div>

</body>
</html>
